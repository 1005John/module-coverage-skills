# AT 知识库测试执行环境配置
# 复制到其他机器后修改 TODO 字段

environment_id: ml307r-lab-01
module_model: ML307R
host_os: windows

paths:
  sdk_root: D:\ML307R\SDK
  runs_dir: D:\ML307R\at_kb_runs

serial:
  at_port: COM16
  baudrate: 115200
  timeout_seconds: 5

coverage:
  reset_command: AT+COVERAGE=1
  summary_command: AT+COVERAGE?
  max_iterations: 3
  targets:
    module_stmt_percent: 80
    module_branch_percent: 60

network:
  mqtt_broker: 8.137.154.246
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
